<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好想你 无核红枣 NFC溯源系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f8f5f0;
            padding: 20px;
        }
        .header-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header-card h1 {
            color: #c00;
            font-size: 20px;
            margin-bottom: 5px;
        }
        .header-card p {
            color: #666;
            font-size: 13px;
        }
        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .info-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="header-card">
        <h1>好想你 无核红枣 NFC溯源</h1>
        <p>扫码/碰NFC标签，一键查看产品全链路信息</p >
    </div>

    <div class="info-card">
        <div class="info-item">
            <div class="info-label">产品名称</div>
            <div class="info-value">好想你 锁鲜去核灰枣</div>
        </div>
        <div class="info-item">
            <div class="info-label">NFC溯源编号</div>
            <div class="info-value">HXNY-2026-001</div>
        </div>
        <div class="info-item">
            <div class="info-label">产地</div>
            <div class="info-value">新疆若羌 核心产区</div>
        </div>
        <div class="info-item">
            <div class="info-label">采摘日期</div>
            <div class="info-value">2026年04月10日</div>
        </div>
        <div class="info-item">
            <div class="info-label">去核工艺</div>
            <div class="info-value">自动化流水线去核，全程无菌操作，果肉损伤率低</div>
        </div>
        <div class="info-item">
            <div class="info-label">生产批次</div>
            <div class="info-value">20260415-01</div>
        </div>
        <div class="info-item">
            <div class="info-label">质检结果</div>
            <div class="info-value">合格，符合国家食品安全标准</div>
        </div>
    </div>
</body>
</html>
