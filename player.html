<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>播放祝福视频</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;height:100vh;display:grid;place-items:center}
video{max-width:100%;max-height:100vh}
</style>
</head>
<body>
<video id="v" controls autoplay playsinline></video>
<script>
const u = new URLSearchParams(location.search).get('video');
if(u){
  const v = document.getElementById('v');
  fetch(u)
  .then(r=>r.blob())
  .then(b=>{
    v.src = URL.createObjectURL(b);
  })
}
</script>
</body>
</html>
